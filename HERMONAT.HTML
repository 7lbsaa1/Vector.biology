<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الباب الثاني: التنسيق الهرموني - Vector Biology</title>
    <link rel="icon" type="image/jpeg" href="https://yt3.ggpht.com/97m8znd6AbHXxbpdPQpvv5Uo9u4Uw9Qsw_dW9GGvx95_JdSYybDCW2O4_ubxG-usaBSdvPzMXg=s160-c-k-c0x00ffffff-no-rj">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-image: url('https://i.pinimg.com/736x/24/fd/82/24fd826a00797d9380f51861632d1643.jpg');
            --panel-bg: rgba(0, 0, 0, 0.75); 
            --panel-border: rgba(255, 255, 255, 0.15); 
            --text-main: #ffffff; 
            --accent-color: #00f2fe; 
            --accent-glow: rgba(0, 242, 254, 0.5); 
            --control-btn-bg: rgba(255, 255, 255, 0.15); 
        }

        body { 
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            color: #fff; 
            overflow: hidden; 
            position: relative;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.4); 
            z-index: 0;
        }

        /* لضمان ظهور العناصر فوق التظليل */
        .back-btn, .video-title, .player-container, .side-instruction {
            z-index: 1;
        }

        .back-btn { 
            position: absolute; 
            top: 25px; 
            right: 25px; 
            background: var(--panel-bg); 
            border: 1px solid var(--panel-border); 
            color: #fff; 
            padding: 12px 24px; 
            border-radius: 30px; 
            text-decoration: none; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 18px; 
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .back-btn:hover { background: var(--accent-color); color: #000; transform: scale(1.05); }

        .video-title { 
            font-size: 32px; 
            font-weight: 900; 
            margin-bottom: 30px; 
            text-align: center; 
            background: linear-gradient(45deg, #fff, var(--accent-color)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.5); 
        }

        .player-container { 
            position: relative; 
            width: 90%; 
            max-width: 950px; 
            aspect-ratio: 16 / 9; 
            background: #000; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 2px solid var(--panel-border); 
            box-shadow: 0 25px 60px rgba(0,0,0,0.8); 
        }

        /* ستايل الملاحظة الجانبية الجديدة */
        .side-instruction {
            position: absolute;
            bottom: 25px;
            right: 25px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-right: 4px solid var(--accent-color); /* شريط جانبي مضيء */
            padding: 15px 20px;
            border-radius: 12px;
            max-width: 280px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            gap: 12px;
            align-items: flex-start;
            transition: all 0.3s ease;
        }

        .side-instruction i {
            color: var(--accent-color);
            font-size: 22px;
            margin-top: 3px;
            animation: pulse 2s infinite;
        }

        .side-instruction p {
            margin: 0;
            font-size: 15px;
            line-height: 1.6;
            font-weight: 600;
            color: #e0e0e0;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.6; }
        }

        /* التوافق مع الشاشات الصغيرة (الهواتف) */
        @media (max-width: 1200px) {
            body { height: auto; overflow-y: auto; padding: 100px 0 40px 0; }
            .back-btn { position: fixed; top: 15px; right: 15px; z-index: 100; font-size: 15px; padding: 8px 16px; }
            .video-title { font-size: 24px; margin-bottom: 15px; padding: 0 15px; }
            .side-instruction { position: relative; bottom: auto; right: auto; margin-top: 25px; max-width: 90%; width: 100%; box-sizing: border-box; }
        }

        .player-container.hide-controls { cursor: none; }
        .iframe-wrapper { position: absolute; top: -12%; left: 0; width: 100%; height: 124%; pointer-events: none; }
        #youtube-player { width: 100%; height: 100%; }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: pointer; }
        
        .custom-poster-cover { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.6); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px); 
            z-index: 15; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transition: opacity 0.5s;
        }

        .custom-poster-cover.video-started { opacity: 0; visibility: hidden; pointer-events: none; }
        .play-image-trigger { width: 100px; height: 100px; cursor: pointer; transition: transform 0.3s; } 
        .play-image-trigger:hover { transform: scale(1.1); }

        .custom-controls { 
            position: absolute; 
            bottom: 0; left: 0; width: 100%; 
            height: 80px; 
            background: var(--panel-bg); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px); 
            border-top: 1px solid var(--panel-border); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 25px; 
            z-index: 20; 
            transition: all 0.3s; 
        }

        .player-container.hide-controls .custom-controls { opacity: 0; transform: translateY(20px); pointer-events: none; }
        .controls-right, .controls-left { display: flex; align-items: center; gap: 15px; } 
        .volume-container { display: flex; align-items: center; gap: 5px; position: relative; }
        .volume-slider-wrapper { width: 0px; overflow: hidden; transition: width 0.3s; display: flex; align-items: center; height: 20px; direction: ltr!important; }
        .volume-container:hover .volume-slider-wrapper, .volume-container.active .volume-slider-wrapper { width: 80px; margin-left: 10px; }
        .volume-slider { width: 100%; height: 6px; background: var(--control-btn-bg); border-radius: 5px; cursor: pointer; position: relative; }
        .volume-filled { height: 100%; background: var(--accent-color); width: 100%; border-radius: 5px; box-shadow: 0 0 10px var(--accent-glow); }
        
        .control-btn { 
            background: var(--control-btn-bg); 
            border: 1px solid var(--panel-border); 
            color: var(--text-main); 
            font-size: 18px; 
            width: 45px; 
            height: 45px; 
            border-radius: 12px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.2s;
        }

        .control-btn:hover { background: var(--accent-color); color: #000; box-shadow: 0 0 20px var(--accent-glow); transform: translateY(-2px); }
        
        .progress-container { flex-grow: 1; margin: 0 20px; display: flex; align-items: center; position: relative; cursor: pointer; height: 25px; direction: ltr!important; }
        .progress-bar { width: 100%; height: 7px; background: var(--control-btn-bg); border-radius: 10px; position: relative; } 
        .progress-filled { height: 100%; background: var(--accent-color); width: 0%; border-radius: 10px; box-shadow: 0 0 10px var(--accent-glow); }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للمكتبة</a>
    <div class="video-title">الباب الأول: مراجعة الدعامة والحركة بالكامل</div>
    
    <div class="player-container" id="main-player-container">
        <div class="custom-poster-cover" id="custom-poster">
            <img src="play.png" alt="Play" class="play-image-trigger" id="img-start-trigger" />
        </div>
        <div class="video-overlay" id="vid-mask"></div>
        <div class="iframe-wrapper"><div id="youtube-player"></div></div>
        
        <div class="custom-controls" id="controls-panel">
            <div class="controls-right">
                <button class="control-btn" id="play-pause-btn"><i class="fas fa-play"></i></button>
                <div class="volume-container" id="vol-zone">
                    <button class="control-btn" id="mute-btn"><i class="fas fa-volume-up"></i></button>
                    <div class="volume-slider-wrapper">
                        <div class="volume-slider" id="volume-timeline">
                            <div class="volume-filled" id="volume-current"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="progress-container" id="progress-timeline">
                <div class="progress-bar">
                    <div class="progress-filled" id="progress-current"></div>
                </div>
            </div>
            <div class="controls-left">
                <button class="control-btn" id="fullscreen-btn"><i class="fas fa-expand"></i></button>
            </div>
        </div>                
    </div>

    <div class="side-instruction">
        <i class="fas fa-lightbulb"></i>
        <p>إذا لم يفتح الفيديو، اضغط على الرابط العلوي ثم البحث وسيفتح في الحال.</p>
    </div>

    <script>
        // --- أكواد الحماية ومنع الفحص (Anti-Inspect) ---
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || e.keyCode === 123) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) { e.preventDefault(); return false; }
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) { e.preventDefault(); return false; }
            if (e.ctrlKey && (e.key === 'S' || e.key === 's')) { e.preventDefault(); return false; }
        });

        // معرف فيديو اليوتيوب الخاص بك
        const currentVideoId = 'GMKrVwQvRww';
    </script>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="secure-player.js"></script>
</body>
</html>
