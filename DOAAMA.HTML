<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الباب الأول: الدعامة والحركة - Vector Biology</title>
    
    <!-- أيقونة الموقع في التبويب (Favicon) -->
    <link rel="icon" type="image/png" href="https://yt3.ggpht.com/97m8znd6AbHXxbpdPQpvv5Uo9u4Uw9Qsw_dW9GGvx95_JdSYybDCW2O4_ubxG-usaBSdvPzMXg=s160-c-k-c0x00ffffff-no-rj">
    
    <!-- استدعاء خط Lemonada من Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lemonada:wght@300..700&display=swap" rel="stylesheet">
    
    <!-- استدعاء مكتبة Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #070b12;
            --neon-blue: #00f2fe;
            --neon-green: #4ece3d;
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        /* حماية إضافية: منع تحديد النصوص */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Lemonada', cursive, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-color);
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* الخلفية الثابتة الموحدة */
        .page-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.pinimg.com/736x/24/fd/82/24fd826a00797d9380f51861632d1643.jpg');
            background-size: cover; background-position: center; background-repeat: no-repeat;
            z-index: -2;
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(7, 11, 18, 0.92); /* زيادة التعتيم لعزل مشغل الفيديو */
            z-index: -1;
        }

        /* جزيئات الخلفية */
        .particles-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; pointer-events: none; z-index: 0;
        }

        .atom {
            position: absolute; background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(1px); border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 50%; animation: floatAtoms 15s infinite linear;
        }

        .atom.c1 { width: 60px; height: 60px; top: 15%; left: 5%; border-color: rgba(0, 242, 254, 0.2); }
        .atom.c2 { width: 80px; height: 80px; top: 75%; left: 85%; border-color: rgba(78, 206, 61, 0.2); animation-duration: 18s; }

        @keyframes floatAtoms {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-30px) rotate(180deg); opacity: 0.6; }
            100% { transform: translateY(0) rotate(360deg); opacity: 0.3; }
        }

        /* شريط التنقل */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 8%; background: rgba(7, 11, 18, 0.9);
            border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-size: 22px; font-weight: bold; color: var(--neon-blue); }
        .logo span { color: var(--neon-green); }
        .nav-links a { color: var(--text-color); text-decoration: none; font-size: 13px; transition: 0.3s; }
        .nav-links a:hover { color: var(--neon-blue); }

        /* حاوية المحتوى */
        .main-container {
            max-width: 1000px; margin: 40px auto 100px auto; padding: 0 20px;
            position: relative; z-index: 2; text-align: center;
        }

        .lecture-title {
            font-size: 2rem; font-weight: 700; margin-bottom: 10px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .lecture-info { color: #8b949e; font-size: 13px; margin-bottom: 40px; }

        /* ================= الإطار الخاص الاحترافي المشغل للمنصة ================= */
        .custom-player-frame {
            position: relative;
            background: rgba(13, 20, 34, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--glass-border);
            border-radius: 24px;
            padding: 12px; /* مسافة داخلية تصنع إطاراً حول الفيديو */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 
                        0 0 30px rgba(0, 242, 254, 0.05);
            transition: 0.4s ease;
        }

        .custom-player-frame:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 
                        0 0 35px rgba(0, 242, 254, 0.2);
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* أبعاد 16:9 */
            background: #000;
            border-radius: 16px;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }

        /* جدار حماية علوي شفاف لمنع الضغط على شعار يوتيوب العلوي أو اسم الفيديو */
        .video-secure-shield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 75px;
            z-index: 5;
            background: transparent;
            pointer-events: auto; /* يلتقط النقر لمنع وصوله لليوتيوب */
        }

        /* غلاف البداية المخصص (Poster) */
        .video-poster {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('play.png'); background-size: cover; background-position: center;
            z-index: 10; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: opacity 0.5s ease, visibility 0.5s;
        }

        .video-poster::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); transition: 0.3s;
        }

        .video-poster:hover::before { background: rgba(0, 0, 0, 0.2); }

        .play-custom-btn {
            position: relative; z-index: 11; width: 85px; height: 85px;
            background: rgba(7, 11, 18, 0.9); border: 2px solid var(--neon-blue);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 30px; color: var(--neon-blue); box-shadow: 0 0 20px var(--neon-blue);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .video-poster:hover .play-custom-btn {
            transform: scale(1.12); color: var(--neon-green);
            border-color: var(--neon-green); box-shadow: 0 0 30px var(--neon-green);
        }

        .video-poster.hidden-poster { opacity: 0; visibility: hidden; pointer-events: none; }

        footer { margin-top: auto; position: relative; background: rgba(7, 11, 18, 0.95); padding: 30px 8% 20px 8%; text-align: center; border-top: 1px solid var(--glass-border); z-index: 2; }
        .copy-right { font-size: 11px; color: #8b949e; }

        @media (max-width: 768px) {
            .lecture-title { font-size: 1.4rem; }
            .custom-player-frame { padding: 6px; border-radius: 16px; }
            .play-custom-btn { width: 65px; height: 65px; font-size: 22px; }
            .video-secure-shield { height: 50px; }
        }
    </style>
</head>
<body>

    <div class="page-bg"></div>
    <div class="bg-overlay"></div>

    <div class="particles-container">
        <div class="atom c1"></div>
        <div class="atom c2"></div>
    </div>

    <nav>
        <div class="logo">فيكتور <span>بيولوجي</span> 🧬</div>
        <div class="nav-links">
            <a href="Courses.HTML"><i class="fas fa-arrow-right"></i> العودة للكورسات</a>
        </div>
    </nav>

    <main class="main-container">
        <h1 class="lecture-title">الباب الأول: مراجعة الدعامة والحركة بالكامل</h1>
        <p class="lecture-info"><i class="far fa-clock"></i> مدة المحاضرة: 5 ساعات كاملة من الشرح والتحليل الفخم</p>

        <!-- الإطار الخاص بالمنصة المحيط بالفيديو -->
        <div class="custom-player-frame" id="player-container">
            <div class="video-wrapper">
                
                <!-- درع الحماية الشفاف المانع لظاهر بيانات اليوتيوب أو النقر عليها علوياً -->
                <div class="video-secure-shield"></div>

                <!-- غلاف البداية المخصص -->
                <div class="video-poster" id="poster" onclick="startVideo()">
                    <div class="play-custom-btn">
                        <i class="fas fa-play"></i>
                    </div>
                </div>

                <!-- تم إضافة modestbranding=1 و showinfo=0 و controls=1 وتعديل روابط المنع لخصوصية كاملة -->
                <iframe id="lecture-video" 
                        src="https://www.youtube.com/embed/92y8T3aFKSU?enablejsapi=1&modestbranding=1&rel=0&showinfo=0&controls=1&iv_load_policy=3" 
                        title="Lecture Player" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen>
                </iframe>

            </div>
        </div>
    </main>

    <footer>
        <div class="copy-right">
            <p>© 2026 جميع الحقوق محفوظة لمنصة فيكتور بيولوجي</p>
        </div>
    </footer>

    <script>
        var player;
        
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('lecture-video', {
                events: { 'onReady': onPlayerReady }
            });
        }

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onPlayerReady(event) {}

        function startVideo() {
            document.getElementById('poster').classList.add('hidden-poster');
            if (player && player.playVideo) { player.playVideo(); }
        }

        // التحكم بـ زر المسطرة (Spacebar) للتشغيل والإيقاف المؤقت للكمبيوتر
        window.addEventListener('keydown', function(e) {
            if (e.code === 'Space' || e.keyCode === 32) {
                e.preventDefault(); 
                if(document.getElementById('poster').classList.contains('hidden-poster') && player) {
                    var state = player.getPlayerState();
                    if (state === 1) { player.pauseVideo(); } else { player.playVideo(); }
                } else { startVideo(); }
            }
        });

        // النقر المزدوج لتكبير الإطار المخصص كاملاً لملء الشاشة
        var container = document.getElementById('player-container');
        container.addEventListener('dblclick', function() {
            if (!document.fullscreenElement) {
                if (container.requestFullscreen) { container.requestFullscreen(); }
                else if (container.mozRequestFullScreen) { container.mozRequestFullScreen(); }
                else if (container.webkitRequestFullscreen) { container.webkitRequestFullscreen(); }
                else if (container.msRequestFullscreen) { container.msRequestFullscreen(); }
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
            }
        });

        // === نظام الحماية الفولاذي المانع لـ الفحص والـنسخ ===
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.code === 'KeyI')) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 74 || e.code === 'KeyJ')) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 67 || e.code === 'KeyC')) { e.preventDefault(); return false; }
            if (e.ctrlKey && (e.keyCode === 85 || e.code === 'KeyU')) { e.preventDefault(); return false; }
        });
    </script>
</body>
</html>
