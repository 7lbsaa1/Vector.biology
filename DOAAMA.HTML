<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الباب الأول: الدعامة والحركة - Vector Biology</title>
    
    <link rel="icon" type="image/png" href="https://yt3.ggpht.com/97m8znd6AbHXxbpdPQpvv5Uo9u4Uw9Qsw_dW9GGvx95_JdSYybDCW2O4_ubxG-usaBSdvPzMXg=s160-c-k-c0x00ffffff-no-rj">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lemonada:wght@300..700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #070b12;
            --neon-blue: #00f2fe;
            --neon-green: #4ece3d;
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        /* حماية إضافية: منع تحديد النصوص في الصفحة بأكملها */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Lemonada', cursive, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-color);
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        /* --- الخلفية الثابتة الموحدة لجميع الكورسات --- */
        .page-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.pinimg.com/736x/24/fd/82/24fd826a00797d9380f51861632d1643.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -2;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(7, 11, 18, 0.9); /* تعتيم ممتاز ومريح للعين لمشاهدة الفيديوهات */
            z-index: -1;
        }

        /* --- جزيئات الخلفية الطائرة بالـ CSS --- */
        .particles-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; pointer-events: none; z-index: 0;
        }

        .atom {
            position: absolute; background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(1px); border: 1px solid rgba(0, 242, 254, 0.15);
            border-radius: 50%; animation: floatAtoms 15s infinite linear;
        }

        .atom.c1 { width: 60px; height: 60px; top: 15%; left: 5%; border-color: rgba(0, 242, 254, 0.2); }
        .atom.c2 { width: 80px; height: 80px; top: 75%; left: 85%; border-color: rgba(78, 206, 61, 0.2); animation-duration: 18s; }

        @keyframes floatAtoms {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-30px) rotate(180deg); opacity: 0.6; }
            100% { transform: translateY(0) rotate(360deg); opacity: 0.3; }
        }

        /* شريط التنقل العلوي */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(7, 11, 18, 0.9);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 22px; font-weight: bold; color: var(--neon-blue); }
        .logo span { color: var(--neon-green); }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 13px;
            transition: 0.3s;
        }

        .nav-links a:hover { color: var(--neon-blue); }

        /* منطقة المحتوى والعنوان */
        .main-container {
            max-width: 1000px;
            margin: 40px auto 100px auto;
            padding: 0 20px;
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .lecture-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lecture-info {
            color: #8b949e;
            font-size: 13px;
            margin-bottom: 40px;
        }

        /* --- حاوية الفيديو الاحترافية المشغلة --- */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* أبعاد الشاشة العريضة 16:9 */
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
        }

        .video-wrapper:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.2);
        }

        /* الإطار الفعلي للفيديو من يوتيوب */
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- واجهة الغلاف الفخمة المخصصة (Poster) --- */
        .video-poster {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('play.png');
            background-size: cover;
            background-position: center;
            z-index: 10; /* تغطي الفيديو بالكامل في البداية */
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        /* فلتر داكن خفيف فوق الغلاف لجمال الأيقونة */
        .video-poster::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            transition: 0.3s;
        }

        .video-poster:hover::before {
            background: rgba(0, 0, 0, 0.2);
        }

        /* زر التشغيل الدائري النيون */
        .play-custom-btn {
            position: relative;
            z-index: 11;
            width: 90px;
            height: 90px;
            background: rgba(7, 11, 18, 0.85);
            border: 2px solid var(--neon-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            color: var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .video-poster:hover .play-custom-btn {
            transform: scale(1.15);
            color: var(--neon-green);
            border-color: var(--neon-green);
            box-shadow: 0 0 30px var(--neon-green);
        }

        /* إخفاء البوستر بسلاسة عند البدء */
        .video-poster.hidden-poster {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* الفوتر */
        footer {
            margin-top: auto;
            position: relative;
            background: rgba(7, 11, 18, 0.95);
            padding: 30px 8% 20px 8%;
            text-align: center;
            border-top: 1px solid var(--glass-border);
            z-index: 2;
        }

        .copy-right { font-size: 11px; color: #8b949e; }

        @media (max-width: 768px) {
            .lecture-title { font-size: 1.5rem; }
            .play-custom-btn { width: 70px; height: 70px; font-size: 25px; }
        }
    </style>
</head>
<body>

    <div class="page-bg"></div>
    <div class="bg-overlay"></div>

    <div class="particles-container">
        <div class="atom c1"></div>
        <div class="atom c2"></div>
    </div>

    <nav>
        <div class="logo">فيكتور <span>بيولوجي</span> 🧬</div>
        <div class="nav-links">
            <a href="Courses.HTML"><i class="fas fa-arrow-right"></i> العودة للكورسات</a>
        </div>
    </nav>

    <main class="main-container">
        <h1 class="lecture-title">الباب الأول: مراجعة الدعامة والحركة بالكامل</h1>
        <p class="lecture-info"><i class="far fa-clock"></i> مدة المحاضرة: 5 ساعات كاملة من الشرح والربط والتحليل الفخم</p>

        <div class="video-wrapper" id="player-container">
            
            <div class="video-poster" id="poster" onclick="startVideo()">
                <div class="play-custom-btn">
                    <i class="fas fa-play"></i>
                </div>
            </div>

            <iframe id="lecture-video" 
                    src="https://www.youtube.com/embed/92y8T3aFKSU?enablejsapi=1&rel=0&showinfo=0&controls=1" 
                    title="YouTube video player" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
            </iframe>

        </div>
    </main>

    <footer>
        <div class="copy-right">
            <p>© 2026 جميع الحقوق محفوظة لمنصة فيكتور بيولوجي</p>
        </div>
    </footer>

    <script>
        var player;
        
        // استدعاء وتجهيز الـ YouTube Iframe API للتحكم في التشغيل والإيقاف بالمسطرة والتكبير
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('lecture-video', {
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        // تحميل السكربت الرسمي من جوجل يوتيوب ديناميكياً لضمان سلامة التايم لاين والـ API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onPlayerReady(event) {
            // المشغل جاهز للتحكم
        }

        // دالة تشغيل الفيديو عند الضغط على البوستر المخصص
        function startVideo() {
            document.getElementById('poster').classList.add('hidden-poster');
            if (player && player.playVideo) {
                player.playVideo();
            }
        }

        // 1. التحكم بـ زر المسطرة (Spacebar) للتشغيل والإيقاف المؤقت للكمبيوتر
        window.addEventListener('keydown', function(e) {
            if (e.code === 'Space' || e.keyCode === 32) {
                e.preventDefault(); // منع نزول الشاشة لأسفل عند الضغط على المسطرة
                
                // التأكد من أن الطالب قام بفتح الفيديو أولاً واختفى البوستر
                if(document.getElementById('poster').classList.contains('hidden-poster') && player) {
                    var state = player.getPlayerState();
                    if (state === 1) { // 1 تعني أن الفيديو يشتغل حالياً
                        player.pauseVideo();
                    } else {
                        player.playVideo();
                    }
                } else {
                    startVideo(); // تشغيل فوري إذا كان البوستر لسه موجود
                }
            }
        });

        // 2. النقر المزدوج من الكمبيوتر لتكبير الشاشة بالكامل (Fullscreen) للمشغل
        var container = document.getElementById('player-container');
        container.addEventListener('dblclick', function() {
            if (!document.fullscreenElement) {
                if (container.requestFullscreen) { container.requestFullscreen(); }
                else if (container.mozRequestFullScreen) { container.mozRequestFullScreen(); }
                else if (container.webkitRequestFullscreen) { container.webkitRequestFullscreen(); }
                else if (container.msRequestFullscreen) { container.msRequestFullscreen(); }
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
            }
        });


        // ================== نظام الحماية الفولاذي لـ مـنصـتـك ==================

        // أ. منع فتح القائمة عند الضغط على زر الفأرة الأيمن (Right-Click)
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // ب. منع اختصارات لوحة المفاتيح الخاصة بأدوات المطورين وكشف السورس كود
        document.addEventListener('keydown', function(e) {
            // منع F12
            if (e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
            // منع Ctrl + Shift + I (أدوات الفحص)
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.code === 'KeyI')) {
                e.preventDefault();
                return false;
            }
            // منع Ctrl + Shift + J (الكونسول)
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 74 || e.code === 'KeyJ')) {
                e.preventDefault();
                return false;
            }
            // منع Ctrl + Shift + C (العنصر المحدد)
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 67 || e.code === 'KeyC')) {
                e.preventDefault();
                return false;
            }
            // منع Ctrl + U (عرض السورس كود الأساسي للصفحة)
            if (e.ctrlKey && (e.keyCode === 85 || e.code === 'KeyU')) {
                e.preventDefault();
                return false;
            }
        });
    </script>

</body>
</html>
